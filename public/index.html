<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Main Room - CacaoCinema</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#f4ba9c",
                    "on-secondary": "#31312b",
                    "surface-bright": "#443633",
                    "on-tertiary-fixed": "#2e140d",
                    "inverse-surface": "#f4ddd9",
                    "secondary-fixed": "#e5e2db",
                    "on-error-container": "#ffdad6",
                    "on-surface-variant": "#d5c3ba",
                    "surface-container-highest": "#40312f",
                    "on-tertiary-container": "#ffe4dd",
                    "on-primary": "#4b2712",
                    "surface-tint": "#f4ba9c",
                    "tertiary-fixed-dim": "#ecbcaf",
                    "on-secondary-fixed-variant": "#474741",
                    "inverse-primary": "#80543c",
                    "tertiary-container": "#866056",
                    "surface-container-lowest": "#160b0a",
                    "error": "#ffb4ab",
                    "surface-variant": "#40312f",
                    "on-primary-fixed-variant": "#653d26",
                    "secondary-container": "#474741",
                    "surface-container": "#291d1a",
                    "primary-container": "#8c5e45",
                    "tertiary": "#ecbcaf",
                    "inverse-on-surface": "#3b2d2b",
                    "on-error": "#690005",
                    "on-secondary-fixed": "#1c1c17",
                    "on-surface": "#f4ddd9",
                    "surface-container-low": "#251916",
                    "on-primary-container": "#ffe4d7",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#ffdbd1",
                    "on-primary-fixed": "#311302",
                    "background": "#1c110f",
                    "outline": "#9e8d86",
                    "surface": "#1c110f",
                    "on-secondary-container": "#b7b5ae",
                    "outline-variant": "#51443e",
                    "primary-fixed": "#ffdbca",
                    "on-tertiary-fixed-variant": "#603e35",
                    "primary": "#f4ba9c",
                    "surface-container-high": "#342724",
                    "secondary-fixed-dim": "#c9c6bf",
                    "on-tertiary": "#472920",
                    "on-background": "#f4ddd9",
                    "secondary": "#c9c6bf",
                    "surface-dim": "#1c110f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max-width": "1280px",
                    "margin-desktop": "64px",
                    "gutter": "24px",
                    "unit": "8px",
                    "margin-mobile": "20px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Outfit"],
                    "headline-lg": ["Outfit"],
                    "body-lg": ["Outfit"],
                    "title-md": ["Outfit"],
                    "body-md": ["Outfit"],
                    "label-sm": ["Outfit"],
                    "label-md": ["Outfit"],
                    "display-lg": ["Outfit"]
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopNavBar -->
<nav class="bg-surface dark:bg-surface text-primary dark:text-primary font-headline-lg text-headline-lg full-width top-0 bg-surface-container-low dark:bg-surface-container-low flat no shadows duration-300 ease-in-out flex justify-between items-center w-full px-margin-desktop max-w-container-max-width mx-auto h-16 shrink-0 z-50 sticky">
    <div class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary tracking-tight">CacaoCinema</div>
    <div class="hidden md:flex gap-6 items-center h-full">
        <a class="h-full flex items-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors text-title-md" href="lobby.html">Lobby</a>
        <a class="h-full flex items-center text-primary font-bold border-b-2 border-primary pb-1 hover:text-primary-fixed-dim transition-colors text-title-md" href="index.html">Main Room</a>
    </div>
    <div class="flex gap-4 items-center">
        <!-- Share Screen Button configured to match script.js id -->
        <button id="share-btn" class="text-on-surface hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-variant/50" title="Share Screen">
            <span class="material-symbols-outlined" style="font-size: 24px;">present_to_all</span>
        </button>
    </div>
</nav>

<!-- Main Layout Content -->
<div class="flex flex-1 overflow-hidden w-full max-w-container-max-width mx-auto px-margin-mobile md:px-margin-desktop py-gutter gap-gutter">
    <!-- Left Column: Video Player & Participants (70%) -->
    <div class="w-full md:w-[70%] flex flex-col gap-unit">
        <!-- Video Player Container -->
        <div class="relative w-full aspect-video bg-[#0a0504] rounded-xl overflow-hidden flex flex-col justify-end shadow-[0_8px_32px_rgba(26,15,13,0.4)] group">
            
            <!-- Dynamic Video Player configured to match script.js id -->
            <video id="video-player" autoplay playsinline class="absolute inset-0 w-full h-full object-cover z-0"></video>
            
            <img alt="Movie Scene" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500 z-[-1]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbHMvI2xQyGjKxVz12xNil5BJ7U2Y_cd3wOFWRO1pPlswHh2L_SjADaLXykyrNaRnKKnYktjGZeHQ5lb8Vp6ZRQHHfYmu6oNfF9BtIdf-1RPYHA8zAHQPTEURvIMoHGD_CN_cvZO4TVLz0IWzZTSsOjfHUIl2Mc6IqCUVO125DC3Mvlv3qbsNSRAaaPgXSdS6h6TmQ0I0Fk0aiMiU8LilolLd-nWq-EM-gf763DStwnN38OdpIM32yk9QUHSOxcXqONAWQOIfBUg"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent pointer-events-none z-10"></div>
            
            <!-- Video Controls -->
            <div class="relative z-20 w-full p-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-[#40231B]/40 backdrop-blur-md rounded-b-xl border-t border-[#8C5E45]/20">
                <div class="flex justify-between items-center text-on-surface">
                    <div class="flex items-center gap-4">
                        <button id="play-pause-btn" class="hover:text-primary transition-colors hover:scale-110 active:scale-95">
                            <span id="play-icon" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span>
                        </button>
                        <button id="volume-btn" class="hover:text-primary transition-colors hover:scale-110 active:scale-95">
                            <span id="volume-icon" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
                        </button>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="hover:text-primary transition-colors hover:scale-110 active:scale-95">
                            <span class="material-symbols-outlined">subtitles</span>
                        </button>
                        <button id="fullscreen-btn" class="hover:text-primary transition-colors hover:scale-110 active:scale-95">
                            <span class="material-symbols-outlined">fullscreen</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Participants -->
        <div class="mt-4 flex flex-col gap-2">
            <h3 class="font-title-md text-title-md text-on-surface-variant">Watching Together</h3>
            <div class="flex gap-4 overflow-x-auto pb-2">
                <div class="flex flex-col items-center gap-2 group cursor-pointer">
                    <div class="w-[60px] h-[60px] flex items-center justify-center bg-primary text-[#1A0F0D] font-headline-lg font-bold rounded-full border-2 border-primary relative shadow-[0_0_15px_rgba(244,186,156,0.15)] transition-transform group-hover:scale-105">
                        <span id="local-user-initial">Y</span>
                        <div class="absolute bottom-0 right-0 bg-[#40231B] text-primary rounded-full w-5 h-5 flex items-center justify-center border-2 border-surface">
                            <span class="material-symbols-outlined" style="font-size: 12px; font-variation-settings: 'FILL' 1;">star</span>
                        </div>
                    </div>
                    <span id="local-user-name" class="font-label-sm text-label-sm text-on-surface group-hover:text-primary transition-colors mt-2">You</span>
                </div>
                <div id="remote-user-container" class="flex flex-col items-center gap-2 group cursor-pointer" style="display: none;">
                    <div class="w-[60px] h-[60px] flex items-center justify-center bg-surface-container-highest text-on-surface font-headline-lg font-bold rounded-full border-2 border-surface-container-highest transition-transform group-hover:scale-105">
                        <span id="remote-user-initial">P</span>
                    </div>
                    <span id="remote-user-name" class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors mt-2">Peer</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column: Chat Panel (30%) -->
    <div class="hidden md:flex w-[30%] bg-surface-container dark:bg-surface-container rounded-xl shadow-lg border border-surface-container-high overflow-hidden flex-col">
        <!-- Chat Header -->
        <div class="p-4 border-b border-surface-container-highest bg-[#40231B]/30 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">chat_bubble</span>
                <h2 class="font-title-md text-title-md text-on-surface">Room Chat</h2>
            </div>
        </div>
        
        <!-- Chat Messages Area configured to match script.js id -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 font-body-md text-body-md scroll-smooth">
            <div class="text-center">
                <span class="font-label-sm text-label-sm text-on-surface-variant/70 bg-surface-variant/30 px-3 py-1 rounded-full">Welcome to the room</span>
            </div>
        </div>
        
        <!-- Chat Input Area -->
        <div class="p-4 bg-surface-container border-t border-surface-container-highest shrink-0">
            <div class="relative flex items-center">
                <!-- Chat Input configured to match script.js id -->
                <input id="chat-input" class="w-full bg-[#40231B] text-[#F9F6EE] placeholder:text-[#F9F6EE]/50 border-none rounded-full py-3 pl-4 pr-12 focus:ring-1 focus:ring-[#8C5E45] font-body-md transition-all shadow-inner focus:outline-none" placeholder="Type a message..." type="text"/>
                <!-- Send Button configured to match script.js id -->
                <button id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-[#8C5E45] text-[#F9F6EE] hover:bg-primary hover:text-[#1A0F0D] transition-colors shadow-[inset_0_2px_4px_rgba(255,255,255,0.2)] border-none cursor-pointer z-10">
                    <span class="material-symbols-outlined" style="font-size: 18px; font-variation-settings: 'FILL' 1;">send</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
